<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEPaladin Login</title>
    <link rel="shortcut icon" href="https://raw.githubusercontent.com/NEPaladin/NEPaladin.github.io/main/2023.png" />
    <script>
        var 数据表 = null;
        //4个参数分别是 数据库名,版本号，数据库的描述，数据库大小
        var 数据库 = openDatabase('userdata','1..0','information of user accounts',1024*1024);
        //初始化页面()方法，用于页面下方表格元素的引用，并且显示所有的数据库记录
        function 初始化页面(){
             //取得下方的表格元素，并且赋值给全局变量
            数据表 = document.getElementById("数据表");
            显示当前数据库当前表格中的所有数据();
          }//清除页面表格中的所有数据()方法，用于移除所有的表格中的当前显示数据(它并不去除数据库记录)
          function 清除页面表格中的所有数据(){
             //首先，它将<table>下面的所有子元素全部清除
             //所以，这里它对于数据表组件进行遍历
             for(var i=数据表.childNodes.length-1;i>=0;i--){
                 数据表.removeChild(数据表.childNodes[i]);
             }
             
             //全部去除之后，现在需要显示这个表头部分<tr>里面有多个<th>
             //创建表头行到文档树中
             var 表头的一行= document.createElement('tr');
             //表头行的第一个表头
             var 第一个表头=document.createElement('th');
             //表头行的第二个表头
             var 第二个表头=document.createElement('th');
             //表头行的第三个表头
             var 第三个表头=document.createElement('th');
             //表头行的第四个表头
             var 第四个表头=document.createElement('th');
             //设置这3个表头的文本
             第一个表头.innerHTML="姓名";
             第二个表头.innerHTML="ID";
             第三个表头.innerHTML="密码";
             第四个表头.innerHTML="日期"
             //将这些表头依次放在表头行中
             表头的一行.appendChild(第一个表头);
             表头的一行.appendChild(第二个表头);
             表头的一行.appendChild(第三个表头);
             表头的一行.appendChild(第四个表头)
             //将这个新创建的表头行挂到表格中
             数据表.appendChild(表头的一行);
          }
          
          //构建指定数据库行的数据对应的HTML文本。传入参数：数据库结果集中的某一行记录
          function 显示数据(数据行){
              //构建一个表行用于取得当前所要的信息
              var 表格数据的一行= document.createElement('tr');
              //创建第一列，这一列是姓名
              var 第一个数据=document.createElement('td');
              //填充第一列的信息为该行的姓名
              第一个数据.innerHTML=数据行.姓名;
              //创建第二列，这一列是ID
              var 第二个数据=document.createElement('td');
              //填充第一列的信息为该行的message
              第二个数据.innerHTML=数据行.ID;
              //创建第三列，这一列是密码
              var 第三个数据=document.createElement('td')
              //填充第三列的信息为该行的密码
              //创建第四列，这一列是日期
              var 第四个数据=document.createElement('td');
              //创建一个日期对象
              var 日期 = new Date();
              日期.setTime(数据行.时间);
              //将日期的标准形式和国际化日期形式分别设置给当前列
              第四个数据.innerHTML=日期.toLocaleString()+" "+日期.toLocaleTimeString();
              //吧这三列挂到当前行中
              表格数据的一行.appendChild(第一个数据);
              表格数据的一行.appendChild(第二个数据);
              表格数据的一行.appendChild(第三个数据);
              表格数据的一行.appendChild(第四个数据);
              //让这个表格在后面加上这一行
              数据表.appendChild(表格数据的一行);
          }
          
          //这个函数用于显示所有的行到表格中，这些行是从数据库中拿出来的
          function 显示当前数据库当前表格中的所有数据(){
             //开启SQLite数据库事务,它用一个回调函数作为参数表明要执行的语句
             数据库.transaction(function(数据库事务){
                 //首先它创建一个数据库表，里面有4个字段
                 数据库事务.executeSql('CREATE TABLE IF NOT EXISTS 我的数据(姓名,ID,密码,时间)',[]);
                 //创建一个查询语句用来查询数据库表的所有记录(这个由于是所有查询，所以不需要预编译语句和参数 (第二个参数))
                 //然后定义了一个回调函数，表明对于结果集的处理
                 数据库事务.executeSql('SELECT * FROM 我的数据',[],function(数据库事务,查询结果集){
                     
                     //对于结果集，首先，在获取它之前移除页面上的<table>的所有数据
                     清除页面表格中的所有数据();
                     //遍历结果集，对于每一行，依次调用显示数据来在table上创建对于的html文本
                     for(var i=0;i<查询结果集.rows.length;i++){
                         //对于item(i)，也就是某一行记录，我们显示其内容到页面的表格中(构建对应的HTML片断)
                         显示数据(查询结果集.rows.item(i));
                     }
                 });
             }
          
             );
          }
          
          //这个函数用于添加一条记录到数据库中，这些信息有些是从页面获得的，有些是系统生成的。
          function 添加数据(姓名,ID,密码,时间){
             //开启一个数据库事务
             //回调函数是一个有参数的插入语句，可以看到我们插入到表我的数据中，插入的内容也就是参数传递进来的内容
             数据库.transaction(function(数据库事务){
                 
                 //插入的语句是个模板语句
                 //插入成功的回调就是在控制台上输入一行日志
                 数据库事务.executeSql('INSERT INTO 我的数据 VALUES(?,?,?)' , [姓名,ID,密码,时间],function(数据库事务,查询结果集){
                     console.log("成功保存数据!");
                 },
                 //插入失败的回调就是在控制台上输入一行错误日志
                 function(数据库事务,error){
                     console.log(error.source+"::"+error.message);
                 });
             }
             
             );
          }
          
          //保存用户的当前输入，这个是作为点击页面上“Submit”按钮的事件处理函数
          function 保存数据到数据库中(){
             //从HTML页面中取得2个输入框的文本
             var 姓名=document.getElementById('姓名').value;
             var 信息=document.getElementById('ID').value;
             var 信息=document.getElementById('密码').value;
             //得到当前的系统时间
             var 时间= new Date().getTime();
             //将用户名，用户信息，当前时间存到数据库中
             添加数据(姓名,信息,时间);
             显示当前数据库当前表格中的所有数据();
          }
        
    </script>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: linear-gradient(to bottom right, #ff7700, #ff0000);
        }
        .shell{
            width: 640px;
            height: 320px;
            display: flex;
        }
        .box-left{
            background-color: #fff;
            height: 280px;
            top: 20px;
            position: relative;
            width: 50%;
        }
        .box-left h2{
            font: 900 50px '';
            margin: 50px 40px 40px;
        }
        .box-left span{
            display: block;
            color: #999;
            font-style: 14px;
            margin: 40px;
        }
        .box-right{
            background-color: #3d3d44;
            box-shadow: 0 0 40px 16px rgba(0,0,0,.2);
            color: #f1f1f2;
            width: 50%;
        }
        .form{
            margin: 40px;
            position: absolute;
            left: 50%;
            top: 27%;
        }
        label{
            color: #c2c2c5;
            display: block;
            font-size: 14px;
            height: 16px;
            margin-top: 20px;
            margin-bottom: 5px;
            position: relative;
        }
        input{
            background: transparent;
            border: 0;
            color: #f2f2f2;
            font-style: 20px;
            height: 30px;
            line-height: 30px;
            width: 100%;
            outline: none !important;
        }
        label::before{
            content: '';
            display: block;
            position: absolute;
            top: 52px;
            width: 93%;
            height: 3px;
            background-image: linear-gradient(to right,#ffff66,#ff4d00);
        }
        #submit{
            color: #fff;
            margin-top: 40px;
            width: 100px;
            height: 35px;
            background-color: rgba(255,255,255,.1);
            border-radius: 20px;
            float: right;
            transition: .3s;
        }
        #submit:hover{
            letter-spacing: 2px;
            color: #000;
            background-color: #fff;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="box-left">
            <h2>登录</h2>
            <span>远道而来的朋友，不论你是何人，新年快乐。</span>
        </div>
        <div class="box-right">
            <div class="form">
                <label for="Name">Name</label>
                <tr><td><input type="Name" id="姓名"></td></tr>
                <label for="ID">ID</label>
                <tr><td><input type="ID" id="ID"></td></tr>
                <label for="password">Password</label>
                <tr><td><input type="password" id="password"></td></tr>
                <a href="https://NEPaladin.github.io/homepage">
                <tr>
                    <td><input type="submit" id="submit" value="Submit" onclick="保存数据到数据库中();"></td>
                </tr>
            </div>
        </div>
    </div>
</body>
</html>
