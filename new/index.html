<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEPaladin</title>
    <link rel="shortcut icon" href="file:///C:/Users/oscar/Desktop/NEPaladin.github.io-main/2023.png" />

    <style>
        *{
            padding: 0;
            margin: 0;
        }
        body{
            height: 100vh;
            width: 100vh;
            display: flex;
            background-image: linear-gradient(to bottom right, #70fe9b, #0066f5);
            background-repeat: no-repeat;
        }
        
        a {
            text-decoration: none;
        }

        .path{
            font-family: "Microsoft YaHei", Arial, sans-serif;
            margin-left: 5px;
            margin-top: 4px;
            color: #000000;
            height: 3.5vh;
            width: auto;
            font-weight: 500;
            font-size: 20px;
            text-align: center;
            justify-content: center;
            padding: 5px 9px;
            border: 1px solid #ffffff00;
            border-radius: 4px;
            box-shadow: 0px 0px 0px rgba(0, 0, 0, 0.5);
            transition: all 350ms;
        }
        
        .patharrow{
            font-family: "Microsoft YaHei", Arial, sans-serif;
            color: #000000;
            font-size: 30px;
            padding: 0;
            width: 13px;
            border: 1px solid #ffffff00;
            margin-left: 5px;
            margin-top: 3px;
        }

        .path:hover{
            color: #000000;
            border: 1px solid #c7fffc;
            background-color: #c7fff786;
            box-shadow: 0 0px 4px rgba(0,0,0,0.5);
            transition: all 350ms;
        }

        .pathbar{
            padding-left: 0;
            padding-top: 0;
            padding-bottom: 0;
            position: fixed;
            left: 23.8vh;
            top: 2vh;
            width: 139vh; 
            height: 6vh; 
            display: flex; 
            align-content: center;
            flex-direction: row; 
            background-color: #ffffff73;
            backdrop-filter: blur(2px);
            box-shadow: 0 0px 8px rgba(0,0,0,0.5);
            border: 1px solid #ffffff;
            border-radius: 7px;
        }

        .nepaladin{
            margin-left: 5px;
            width: 120px;
            height: 120px;
            padding: 5px 9px;
            border: 1px solid #c5fff5;
            border-radius: 4px;
            margin-top: 7px;
            box-shadow: 0px 0px 0px rgba(0, 0, 0, 0.5);
            transition: 350ms;
        }

        .nepaladin:hover {
            border: 1px solid #ffffff;
            box-shadow: 0 0px 6px rgba(0,0,0,0.5);
            transition: 350ms;
        }


        .indexbox{
            position: relative;
            display: block;
            min-height: 1px;
            border: 0;
            line-height: 0;
            background: #f5f5f6;
            overflow: hidden;
            border-radius: 10px;
        }

        .sidebar{
            padding-left: 0;
            padding-top: 0;
            padding-bottom: 0;
            position: fixed;
            left: 2vh;
            top: 2vh;
            width:19vh; 
            height: 96vh; 
            display: flex; 
            align-content: center;
            flex-direction: column; 
            background-color: #ffffff73;
            backdrop-filter: blur(2px);
            box-shadow: 0 0px 8px rgba(0,0,0,0.5);
            border: 1px solid #ffffff;
            border-radius: 7px;
        }
        
        .space{
            height: 100vh;
            width: 120px;
        }

        .space2{
            height: 5px;
            width: auto;
        }

        .clickbar{ 
            font-family: "Microsoft YaHei", Arial, sans-serif;
            margin-left: 5px;
            color: #000000;
            width: 120px;
            font-weight: 500;
            font-size: 20px;
            padding: 5px 9px;
            border: 1px solid #c5fff5;
            border-radius: 4px;
            box-shadow: 0px 0px 0px rgba(0, 0, 0, 0.5);
            margin-top: 7px;
            transition: all 350ms;
        }

        .clickbar:hover {
            color: #000000;
            border: 1px solid #ffffff;
            background-color: #dedede6f;
            box-shadow: 0 0px 6px rgba(0,0,0,0.5);
            transition: all 350ms;
        }

        .copyright{
            font-family: "Microsoft YaHei", Arial, sans-serif;
            height: 6em;
            font-size: 8px;
            text-align: center;
        }

    </style>
</head>
<body>
    <div class="sidebar">
        <a href="https://NEPaladin.github.io/">
            <img class="nepaladin" src="https://github.com/NEPaladin/NEPaladin.github.io/blob/main/src/icon_minimized.png?raw=true">
        </a>
        <a class="clickbar" href="https://NEPaladin.github.io/news">News</a>
        <a class="clickbar" href="https://NEPaladin.github.io/projects">Projects</a>
        <a class="clickbar" href="https://NEPaladin.github.io/tookits">Tookit</a>
        <a class="clickbar" href="https://NEPaladin.github.io/issues">Issues</a>
        <a class="clickbar" href="https://NEPaladin.github.io/contact">Contact</a>
        <a class="clickbar" href="https://NEPaladin.github.io/thanks">Thanks</a>
        <a class="space"></a>
        <a class="clickbar settings" href="https://NEPaladin.github.io/settings">Settings</a>
        <a class="space2"></a>
        <span class="copyright">© 2023 NEP</span>
    </div>
    <div class="pathbar">
        <a class="path" href="https://NEPaladin.github.io/">Homepage</a>
    </div>
</body>



</html>
